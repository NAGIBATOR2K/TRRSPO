name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential

      - name: Build
        run: ./build.sh
        working-directory: ./cicd

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: binary
          path: usr/bin/maxfinder

  test:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt install -y build-essential

      - name: Prepare binary
        run: mkdir -p usr/bin

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: binary
          path: usr/bin
      
      - name: Make binary executable
        run: chmod +x usr/bin/maxfinder

      - name: Run tests
        run: ./test.sh
        working-directory: ./cicd

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dpkg
        run: sudo apt install -y dpkg-dev

      - name: Prepare binary
        run: mkdir -p usr/bin

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: binary
          path: usr/bin

      - name: Build deb
        run: ./deploy.sh "../maxfinder.deb"
        working-directory: ./cicd

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: maxfinder.deb

  docker:
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download deb package
        uses: actions/download-artifact@v4
        with:
          name: deb-package
          path: .

      - name: Build Docker image
        run: docker build -t maxfinder-image .

      - name: Run container
        run: docker run --rm maxfinder-image sh -c "printf '5\n1 2 3 4 5\n' | /usr/bin/maxfinder"

      - name: Login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
  
      - name: Tag
        run: docker tag maxfinder-image ${{ secrets.DOCKER_USERNAME }}/maxfinder:latest
  
      - name: Push
        run: docker push ${{ secrets.DOCKER_USERNAME }}/maxfinder:latest
